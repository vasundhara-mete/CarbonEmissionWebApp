apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbon-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carbon-app
  template:
    metadata:
      labels:
        app: carbon-app
    spec:
      containers:
      - name: carbon-app-container
        image: carbon-app            # Local image name
        imagePullPolicy: Never       # Use local image
        ports:
        - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: carbon-app-service
spec:
  type: NodePort
  selector:
    app: carbon-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007